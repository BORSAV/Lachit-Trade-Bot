name: Sniper Bot 24/7

on:
  schedule:
    # GitHub's minimum interval is 5-10 minutes, but we keep the loop in Python
    - cron: '*/5 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to press "Run Workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sniper Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Setting a timeout so GitHub doesn't kill it immediately
        run: timeout 350m python main_bot.py || true
