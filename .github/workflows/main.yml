name: Sniper Bot 24/7
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # <--- This speeds up your "Process" time!

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Sniper Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Runs for 5.5 hours then resets
        run: timeout 330m python main_bot.py || true
